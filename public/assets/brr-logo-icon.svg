<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Core Brand Gradients -->
    <linearGradient id="gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D5A3" />
      <stop offset="50%" stop-color="#DDAE53" />
      <stop offset="100%" stop-color="#C8922A" />
    </linearGradient>

    <linearGradient id="gold-rev" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8922A" />
      <stop offset="50%" stop-color="#DDAE53" />
      <stop offset="100%" stop-color="#E8D5A3" />
    </linearGradient>

    <linearGradient id="green-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A6B1D" />
      <stop offset="100%" stop-color="#1A300D" />
    </linearGradient>

    <!-- Background & Glow Gradients -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E7" />
      <stop offset="60%" stop-color="#F4E6C3" />
      <stop offset="100%" stop-color="#E8D5A3" />
    </radialGradient>

    <radialGradient id="outer-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DDAE53" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#C8922A" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#C8922A" stop-opacity="0" />
    </radialGradient>

    <!-- Highlight & Shadow Masks for 3D Bezel Effect -->
    <linearGradient id="bezel-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="bezel-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5" />
    </linearGradient>

    <!-- Filters -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#050802" flood-opacity="0.6" />
    </filter>

    <filter id="inner-shadow">
      <feOffset dx="0" dy="4" />
      <feGaussianBlur stdDeviation="6" result="offset-blur" />
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
      <feFlood flood-color="black" flood-opacity="0.4" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>

    <filter id="element-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#A6731E" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Deep Rich Background -->
  <rect width="100%" height="100%" fill="#0A0F05" />

  <!-- Subtle Radial Glow Behind Badge -->
  <circle cx="250" cy="250" r="250" fill="url(#outer-glow)" />

  <!-- Main Emblem Group -->
  <g filter="url(#drop-shadow)">
    
    <!-- Outer Golden Bezel (Base) -->
    <circle cx="250" cy="250" r="200" fill="url(#gold-main)" />
    
    <!-- Outer Bezel Highlights & Shadows -->
    <circle cx="250" cy="250" r="199" fill="none" stroke="url(#bezel-highlight)" stroke-width="2" />
    <circle cx="250" cy="250" r="199" fill="none" stroke="url(#bezel-shadow)" stroke-width="2" />

    <!-- Inner Bezel Slope (Reversed Gradient for 3D depth) -->
    <circle cx="250" cy="250" r="182" fill="url(#gold-rev)" />
    
    <!-- Inner Bezel Edge Shadow -->
    <circle cx="250" cy="250" r="182" fill="none" stroke="#8A5A10" stroke-width="1" opacity="0.5" />

    <!-- Badge Face (Warm Amber Glow) -->
    <circle cx="250" cy="250" r="174" fill="url(#bg-glow)" filter="url(#inner-shadow)" />

    <!-- Premium Geometric Details: Guilloché / Dot Rings -->
    <!-- Outer Dot Ring (100 perfectly spaced dots) -->
    <circle cx="250" cy="250" r="164" fill="none" stroke="#C8922A" stroke-width="2.5" stroke-dasharray="0 10.3044" stroke-linecap="round" opacity="0.8" />
    
    <!-- Inner Thin Framing Ring -->
    <circle cx="250" cy="250" r="154" fill="none" stroke="url(#gold-main)" stroke-width="1.5" opacity="0.6" />

    <!-- Central Elements Group (Shifted for perfect visual balance) -->
    <g transform="translate(-2.5, 35)" filter="url(#element-shadow)">
      
      <!-- Organic Leaf Motif -->
      <g>
        <!-- Center Leaf -->
        <path d="M 250 170 C 242 145, 242 115, 250 100 C 258 115, 258 145, 250 170 Z" fill="url(#green-grad)" stroke="url(#gold-main)" stroke-width="1.5" stroke-linejoin="round" />
        <!-- Left Leaf -->
        <path d="M 247 167 C 220 162, 195 140, 205 115 C 225 125, 240 145, 247 167 Z" fill="url(#green-grad)" stroke="url(#gold-main)" stroke-width="1.5" stroke-linejoin="round" />
        <!-- Right Leaf -->
        <path d="M 253 167 C 280 162, 305 140, 295 115 C 275 125, 260 145, 253 167 Z" fill="url(#green-grad)" stroke="url(#gold-main)" stroke-width="1.5" stroke-linejoin="round" />
        <!-- Stem -->
        <path d="M 250 168 L 250 188" fill="none" stroke="url(#gold-main)" stroke-width="2.5" stroke-linecap="round" />
        
        <!-- Leaf Veins (Premium Detail) -->
        <path d="M 250 165 C 250 140, 250 115, 250 105" fill="none" stroke="#E8D5A3" stroke-width="1" stroke-linecap="round" opacity="0.7" />
        <path d="M 246 162 C 235 150, 220 135, 210 120" fill="none" stroke="#E8D5A3" stroke-width="1" stroke-linecap="round" opacity="0.7" />
        <path d="M 254 162 C 265 150, 280 135, 290 120" fill="none" stroke="#E8D5A3" stroke-width="1" stroke-linecap="round" opacity="0.7" />
      </g>

      <!-- Stylized "BRR" Typography (Custom Geometric Serif Paths) -->
      <g fill="url(#green-grad)" stroke="url(#gold-main)" stroke-width="1.5" fill-rule="evenodd">
        
        <!-- Letter B -->
        <path d="
          M 110 230 h 45 
          c 25 0, 35 10, 35 25 
          c 0 12, -8 20, -20 24 
          c 15 4, 25 12, 25 26 
          c 0 18, -12 25, -40 25 
          h -45 v -8 h 10 v -84 h -10 Z
          M 140 240 h 15 
          c 12 0, 18 5, 18 16 
          c 0 11, -6 16, -18 16 
          h -15 Z
          M 140 282 h 20 
          c 14 0, 20 6, 20 19 
          c 0 13, -6 19, -20 19 
          h -20 Z
        " />

        <!-- Letter R (First) -->
        <path d="
          M 210 230 h 45 
          c 25 0, 35 10, 35 25 
          c 0 12, -8 20, -20 24 
          l 25 43 h 5 v 8 h -25 v -8 
          l -20 -35 h -15 v 35 
          h 10 v 8 h -40 v -8 h 10 v -84 h -10 Z
          M 240 240 h 15 
          c 12 0, 18 5, 18 16 
          c 0 11, -6 16, -18 16 
          h -15 Z
        " />

        <!-- Letter R (Second) -->
        <path d="
          M 310 230 h 45 
          c 25 0, 35 10, 35 25 
          c 0 12, -8 20, -20 24 
          l 25 43 h 5 v 8 h -25 v -8 
          l -20 -35 h -15 v 35 
          h 10 v 8 h -40 v -8 h 10 v -84 h -10 Z
          M 340 240 h 15 
          c 12 0, 18 5, 18 16 
          c 0 11, -6 16, -18 16 
          h -15 Z
        " />
      </g>
    </g>
  </g>
</svg>